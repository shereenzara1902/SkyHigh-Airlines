<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVIATION_SUITE | OPS_CORE_v3.1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <header class="status-bar">
            <div class="branding">AVIATION_SUITE_<span class="highlight">OPS</span></div>
            <div class="system-metrics">
                <span class="metric">SAT_LINK: <span class="active">CONNECTED</span></span>
                <span class="metric">TIME: <span id="clock">00:00:00</span></span>
            </div>
        </header>

        <main class="workspace">
            <section class="panel crew-panel">
                <div class="panel-header">ASSET_INVENTORY [CREW]</div>
                <div class="search-box">
                    <input type="text" placeholder="FILTER_BY_UID..." id="crewSearch">
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>UID</th><th>NAME</th><th>STATUS</th></tr>
                        </thead>
                        <tbody id="crew-body"></tbody>
                    </table>
                </div>
            </section>

            <section class="panel ops-panel">
                <div class="panel-header">LIVE_OPERATIONS_RADAR</div>
                <div id="flight-grid" class="flight-grid"></div>
            </section>
        </main>

        <footer class="system-logs">
            <div class="ticker">
                <span class="prefix">SYS_LOG:</span>
                <marquee id="log-text">Initializing Secure Satellite Uplink... Database v3.1 Synced... Monitoring 128 Active Sectors...</marquee>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
